services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: filesync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the stack/.env.prod}
      POSTGRES_DB: filesync
    volumes:
      - ${STORAGE_PATH:-/storage/filesync}/postgres:/var/lib/postgresql/data
    networks:
      - filesync
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filesync -d filesync"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    # All config is supplied via interpolation so the same file works whether you
    # deploy with `docker compose --env-file .env.prod ...` or via a Portainer
    # stack (set these in the stack's "Environment variables" section).
    environment:
      DATABASE_URL: postgresql://filesync:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the stack/.env.prod}@postgres:5432/filesync
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in the stack/.env.prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in the stack/.env.prod}
      NODE_ENV: ${NODE_ENV:-production}
      # Internal port the API server listens on (Caddy proxies to it).
      PORT: ${BACKEND_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # Default admin account, created idempotently on startup. Change these before
      # the first deploy — the password is only applied when the user is created.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@email.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      # --- Shared identity via the Universal Admin server ---
      # Set AUTH_MODE=universal in the Portainer stack env to delegate login.
      AUTH_MODE: ${AUTH_MODE:-local}
      UNIVERSAL_AUTH_URL: ${UNIVERSAL_AUTH_URL:-http://localhost:9000}
      UNIVERSAL_AUTH_ISSUER: ${UNIVERSAL_AUTH_ISSUER:-}
      UNIVERSAL_AUTH_APP: ${UNIVERSAL_AUTH_APP:-file-sync}
      # --- Cross-subdomain SSO cookie ---
      ENABLE_AUTH_COOKIES: ${ENABLE_AUTH_COOKIES:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    # Migrate, seed the admin once on an empty database (non-fatal), then start the server.
    command:
      - sh
      - -c
      - bun run apps/server/src/db/migrate.ts && (bun run apps/server/src/db/seed.ts || echo "admin seed skipped") && bun run apps/server/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
    # Published so the API is reachable directly at http://<host-ip>:<BACKEND_PORT>
    # (in addition to https://<domain>/api via Caddy).
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    volumes:
      # CAS blobs — the container writes to its default /app/data/blobs, bind-mounted
      # under STORAGE_PATH on the host so all data lives on one volume.
      - ${STORAGE_PATH:-/storage/filesync}/blobs:/app/data/blobs
    networks:
      - filesync
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-https://localhost}
    restart: unless-stopped
    environment:
      # Port nginx serves the SPA on (Caddy proxies to it; also published below).
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
    # Published so the dashboard is reachable directly at http://<host-ip>:<FRONTEND_PORT>
    # (in addition to https://<domain>/ via Caddy). Defaults to 8080 to avoid clashing
    # with Caddy on 80.
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_PORT:-8080}"
    networks:
      - filesync

  caddy:
    # Built from apps/caddy/Dockerfile, which bakes the Caddyfile into the image — this
    # avoids the fragile single-file bind mount that breaks Portainer/git deployments.
    # Caddy still substitutes {$FILESYNC_DOMAIN} / {$BACKEND_PORT} / {$FRONTEND_PORT} from
    # the environment at load time, so everything stays configurable via the stack env.
    build:
      context: .
      dockerfile: apps/caddy/Dockerfile
    restart: unless-stopped
    environment:
      # Default ':80' = serve plain HTTP for any host (no auto-HTTPS) — ideal behind a
      # reverse proxy / cloudflared tunnel that terminates TLS. Set it to a real domain
      # for Caddy to obtain a Let's Encrypt certificate itself.
      FILESYNC_DOMAIN: ${FILESYNC_DOMAIN:-:80}
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
    # Host ports Caddy is published on. Defaults are 80/443; override when those are
    # taken on the host (e.g. behind a cloudflared tunnel point it at CADDY_HTTP_PORT).
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ${STORAGE_PATH:-/storage/filesync}/caddy/data:/data
      - ${STORAGE_PATH:-/storage/filesync}/caddy/config:/config
    networks:
      - filesync
    depends_on:
      - server
      - web

networks:
  filesync:
    driver: bridge
# All persistent state lives under STORAGE_PATH (default /storage/filesync) as host
# bind mounts on a single volume you can back up; Docker creates the subdirectories on
# first start:
#   ${STORAGE_PATH}/postgres      PostgreSQL data
#   ${STORAGE_PATH}/blobs         content-addressed file blobs
#   ${STORAGE_PATH}/caddy/data    Let's Encrypt certificates
#   ${STORAGE_PATH}/caddy/config  Caddy autosave config

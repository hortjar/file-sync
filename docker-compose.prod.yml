services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: filesync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the stack/.env.prod}
      POSTGRES_DB: filesync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filesync -d filesync"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    # All config is supplied via interpolation so the same file works whether you
    # deploy with `docker compose --env-file .env.prod ...` or via a Portainer
    # stack (set these in the stack's "Environment variables" section).
    environment:
      DATABASE_URL: postgresql://filesync:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the stack/.env.prod}@postgres:5432/filesync
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in the stack/.env.prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in the stack/.env.prod}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      STORAGE_PATH: ${STORAGE_PATH:-./data/blobs}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - blobs_data:/app/data/blobs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-https://filesync.hortjar.cz}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Caddy substitutes {$FILESYNC_DOMAIN} in the Caddyfile at load time, so the
    # domain is configurable without editing the repo (set it in the stack env).
    environment:
      FILESYNC_DOMAIN: ${FILESYNC_DOMAIN:-filesync.hortjar.cz}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - web

volumes:
  postgres_data:
  blobs_data:
  caddy_data:
  caddy_config:
